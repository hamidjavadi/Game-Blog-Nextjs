version: '3.9'

services:
  server:
    build:
      context: .
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    networks:
      - blog-network

  postgres:
    image: postgres:latest
    restart: always
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/data/db
    environment:
      POSTGRES_PASSWORD: 123456
    networks:
      - blog-network

networks:
  blog-network:
    driver: bridge

volumes:
  node_modules:
  postgres_data:
